<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健身 Log V3.0</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="./icon.png">
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #03dac6; /* 改個顏色區分版本 */
            --text-color: #e0e0e0;
            --input-bg: #2c2c2c;
            --border-color: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            margin: 0;
            line-height: 1.5;
        }
        h2 { text-align: center; color: var(--primary-color); margin-bottom: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; color: #aaa; }
        select, input, textarea, button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 16px; 
            box-sizing: border-box;
            appearance: none;
        }
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        
        button {
            background-color: var(--primary-color);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            border: none;
        }
        button:active { opacity: 0.8; }
        button.secondary { background-color: #bb86fc; margin-top: 5px; }
        
        #log-display {
            margin-top: 30px;
            background-color: var(--surface-color);
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 12px;
            border: 1px solid var(--border-color);
            min-height: 100px;
        }
        .history-item {
            background: #252525;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 4px solid var(--primary-color);
            font-size: 0.9em;
        }
        .history-meta { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏋️‍♂️ Workout Log v1.4</h2>
    
    <div class="form-group">
        <label>日期 (Date)</label>
        <input type="date" id="date">
    </div>

    <div class="form-group">
        <label>部位 (Muscle Group)</label>
        <select id="muscleGroup">
            <option value="" disabled selected>請選擇部位</option>
        </select>
    </div>

    <div class="form-group">
        <label>動作 (Exercise)</label>
        <select id="exercise">
            <option value="" disabled selected>先選擇部位</option>
        </select>
    </div>

    <div class="row">
        <div class="form-group">
            <label>重量 (kg)</label>
            <select id="weight"></select>
        </div>
        <div class="form-group">
            <label>次數 (Reps)</label>
            <select id="reps"></select>
        </div>
        <div class="form-group">
            <label>組數 (Sets)</label>
            <select id="sets"></select>
        </div>
    </div>
    <div id="last-record-hint" style="color: var(--primary-color); font-size: 0.85em; margin-top: -5px; margin-bottom: 15px; display: none;">
    </div>
    <div class="form-group">
        <label>備註 (Notes / RPE)</label>
        <input type="text" id="notes" placeholder="e.g. 力竭, 手錶沒電...">
    </div>

    <button onclick="addLog()">➕ 紀錄這組 (Add Log)</button>
    
    <div id="history-list" style="margin-top:20px;"></div>

    <label style="margin-top: 30px;">CSV 輸出區 (無標題列)</label>
    <textarea id="log-display" readonly></textarea>
    
    <button class="secondary" onclick="robustCopyToClipboard()">📋 複製 CSV</button>
    <button class="secondary" onclick="clearData()" style="background-color: #333; color: #fff">🧹 結束今日訓練 (清空畫面)</button>
</div>

<script>
    // --- Data Configuration (V8.0 課表) ---
const menu = {
        "Chest": ["Incline Chest Press (30deg)", "Low-to-High Cable Fly", "Chest Press (Machine)", "Cable Fly", "DB Flat Fly", "DB Chest Press"],
        "Back": ["Straight-Arm Lat Pulldown", "Cable Row", "DB One-Arm Row", "Lat Pulldown"],
        "Legs": ["Leg Extension", "Leg Curl", "DB RDL (B-Stance)", "DB Goblet Squat", "DB RDL"],
        "Shoulder": [ "Cable Side Raise", "Cable Face Pull", "Cable External Rotation", "Cable 90/90 External Rotation", "Cable Rear Delt Fly", "DB Side Raise", "DB Rear Delt Fly"],
        "Arms": ["Cable Bicep Curl", "Cable Hammer Curl", "Cable Overhead Tricep Extension", "Cable Tricep Pushdown", "DB Bicep Curl", "DB Overhead Tricep Ext"],
        "Leg (Bone)": ["Trap Bar Squat","Trap Bar Deadlift", "Farmer's Walk", "Bulgarian Split Squat","Speed Jumping"],
        "Cardio": ["Zone 2 Spin Bike", "HIIT Spin Bike", "Jumping Jacks"]
    };


    // --- Initialization ---
    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').value = today;

        const muscleSelect = document.getElementById('muscleGroup');
        for (let key in menu) {
            let opt = document.createElement('option');
            opt.value = key;
            opt.innerHTML = key;
            muscleSelect.appendChild(opt);
        }

        // --- 抽離重量選單渲染邏輯，方便新增後重繪 ---
        renderWeightDropdown();

        const repsSelect = document.getElementById('reps');
        let opt200 = document.createElement('option');
        opt200.value = 200;
        opt200.innerHTML = 200;
        repsSelect.appendChild(opt200);
        for (let i = 1; i <= 100; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = i;
            if (i === 12) opt.selected = true;
            repsSelect.appendChild(opt);
        }

        const setsSelect = document.getElementById('sets');
        for (let i = 1; i <= 10; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = i;
            setsSelect.appendChild(opt);
        }

        renderCSV();
        renderHistoryList();
    };

// 渲染重量選單 (合併預設與自訂重量)
    function renderWeightDropdown(autoSelectWeight = 10) {
        const weightSelect = document.getElementById('weight');
        weightSelect.innerHTML = ''; // 清空重新渲染

        // 1. 產生預設重量陣列
        let defaultWeights = [8];
        for (let i = 0; i <= 60; i += 3) { if(!defaultWeights.includes(i)) defaultWeights.push(i); }
        for (let i = 2.5; i <= 100; i += 2.5) { if(!defaultWeights.includes(i)) defaultWeights.push(i); }
        
        // 2. 撈取自訂重量並合併
        let customWeights = JSON.parse(localStorage.getItem('custom_weights') || "[]");
        let allWeights = [...new Set([...defaultWeights, ...customWeights])]; // 合併並去重
        
        // 3. 排序 (強制轉為數字排序，避免字串排序出錯)
        allWeights.sort((a, b) => parseFloat(a) - parseFloat(b));

        // 4. 渲染到選單
        allWeights.forEach(w => {
            let opt = document.createElement('option');
            opt.value = w;
            opt.innerHTML = w;
            if (parseFloat(w) === parseFloat(autoSelectWeight)) opt.selected = true;
            weightSelect.appendChild(opt);
        });

        // 5. 加入新增選項
        let addOpt = document.createElement('option');
        addOpt.value = "__ADD_NEW_WEIGHT__";
        addOpt.innerHTML = "➕ 新增自訂重量...";
        weightSelect.appendChild(addOpt);
    }
    
    // --- Dynamic Dropdown Logic ---
    // 建立一個共用函數來更新動作選單，方便重複呼叫
    function updateExerciseDropdown(muscle, autoSelectExercise = "") {
        const exerciseSelect = document.getElementById('exercise');
        exerciseSelect.innerHTML = '<option value="" disabled>請選擇動作</option>'; 
        
        // 1. 取得預設動作
        let exercises = [...menu[muscle]];
        
        // 2. 從 localStorage 撈取自訂動作並合併
        let customMenu = JSON.parse(localStorage.getItem('custom_exercises') || "{}");
        if (customMenu[muscle]) {
            exercises = exercises.concat(customMenu[muscle]);
        }

        // 3. 渲染所有動作到下拉選單
        exercises.forEach(ex => {
            let opt = document.createElement('option');
            opt.value = ex;
            opt.innerHTML = ex;
            if (ex === autoSelectExercise) opt.selected = true; // 自動選取剛新增的動作
            exerciseSelect.appendChild(opt);
        });

        // 4. 在選單最下方加入「新增」選項
        let addOpt = document.createElement('option');
        addOpt.value = "__ADD_NEW__";
        addOpt.innerHTML = "➕ 新增自訂動作...";
        exerciseSelect.appendChild(addOpt);
        
        // 如果沒有指定要自動選取的動作，就預設停在提示選項
        if (!autoSelectExercise) {
            exerciseSelect.value = "";
        }
    }

    // 當「部位」改變時，觸發更新動作選單，並隱藏提示
    document.getElementById('muscleGroup').addEventListener('change', function() {
        updateExerciseDropdown(this.value);
        document.getElementById('last-record-hint').style.display = 'none';
    });

    // 監聽「動作」下拉選單，處理新增動作與「自動帶入上次紀錄」的邏輯
    document.getElementById('exercise').addEventListener('change', function() {
        const selectedExercise = this.value;
        const muscle = document.getElementById('muscleGroup').value;
        const hintDiv = document.getElementById('last-record-hint');

        if (selectedExercise === "__ADD_NEW__") {
            // 跳出輸入框讓使用者輸入
            const newExercise = prompt(`請輸入新的 [${muscle}] 動作名稱：\n(例如：Decline DB Press)`);

            if (newExercise && newExercise.trim() !== "") {
                const cleanName = newExercise.trim();
                let customMenu = JSON.parse(localStorage.getItem('custom_exercises') || "{}");
                
                if (!customMenu[muscle]) customMenu[muscle] = [];
                if (!menu[muscle].includes(cleanName) && !customMenu[muscle].includes(cleanName)) {
                    customMenu[muscle].push(cleanName);
                    localStorage.setItem('custom_exercises', JSON.stringify(customMenu));
                }

                updateExerciseDropdown(muscle, cleanName);
                // 新增的動作沒有歷史紀錄，隱藏提示
                hintDiv.style.display = 'none';
            } else {
                this.value = "";
                hintDiv.style.display = 'none';
            }
        } else if (selectedExercise !== "") {
            // --- 新增：自動帶入上次紀錄邏輯 ---
            let logs = JSON.parse(localStorage.getItem('workout_logs') || "[]");
            let lastLog = null;
            
            // 從最新的紀錄往回找，找到同部位且同動作的第一筆
            for (let i = logs.length - 1; i >= 0; i--) {
                if (logs[i].muscle === muscle && logs[i].exercise === selectedExercise) {
                    lastLog = logs[i];
                    break;
                }
            }

            if (lastLog) {
                // 自動變更下拉選單的數值
                document.getElementById('weight').value = lastLog.weight;
                document.getElementById('reps').value = lastLog.reps;
                
                // 顯示提示文字
                hintDiv.innerHTML = `💡 上次紀錄：${lastLog.weight}kg x ${lastLog.reps} reps (${lastLog.sets} sets) <span style="color:#888; font-size:0.9em;">- ${lastLog.date}</span>`;
                hintDiv.style.display = "block";
            } else {
                // 沒練過這個動作，隱藏提示
                hintDiv.style.display = "none";
            }
            // ------------------------------------
        }
    });

    // 監聽「重量」下拉選單，處理新增自訂重量
    document.getElementById('weight').addEventListener('change', function() {
        if (this.value === "__ADD_NEW_WEIGHT__") {
            const newWeight = prompt("請輸入新的重量 (kg)：\n(僅限數字，可輸入小數點，如 12.5)");

            if (newWeight && newWeight.trim() !== "" && !isNaN(newWeight)) {
                const cleanWeight = parseFloat(newWeight.trim());
                let customWeights = JSON.parse(localStorage.getItem('custom_weights') || "[]");
                
                // 存入 localStorage (避免重複)
                if (!customWeights.includes(cleanWeight)) {
                    customWeights.push(cleanWeight);
                    localStorage.setItem('custom_weights', JSON.stringify(customWeights));
                }

                // 重新渲染並選中新重量
                renderWeightDropdown(cleanWeight);
            } else {
                // 輸入無效或取消，把選單切回預設的 10kg，避免卡在提示選項
                if(newWeight !== null) alert("請輸入有效的數字！");
                renderWeightDropdown(10); 
            }
        }
    });
    
    
    // --- Core Logic ---
    function addLog() {
        const date = document.getElementById('date').value;
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const dayName = days[new Date(date).getDay()];

        const muscle = document.getElementById('muscleGroup').value;
        const exercise = document.getElementById('exercise').value;
        const weight = document.getElementById('weight').value;
        const reps = document.getElementById('reps').value;
        const sets = document.getElementById('sets').value;
        const notes = document.getElementById('notes').value || "-";

        if (!muscle || !exercise) {
            alert("請選擇部位和動作！");
            return;
        }

        const newEntry = {
            date, day: dayName, muscle, exercise, weight, reps, sets, notes, timestamp: new Date().getTime()
        };

        let logs = JSON.parse(localStorage.getItem('workout_logs') || "[]");
        
        // --- 修改：只拿畫面上「還沒被清除」的紀錄來做比對 ---
        let visibleLogs = logs.filter(log => !log.cleared);

        if (visibleLogs.length > 0) {
            let lastLog = visibleLogs[visibleLogs.length - 1]; // 畫面上最新的一筆
            if (
                lastLog.date === date &&
                lastLog.muscle === muscle &&
                lastLog.exercise === exercise &&
                lastLog.weight === weight &&
                lastLog.reps === reps &&
                lastLog.notes === notes
            ) {
                // 條件皆符合，直接累加 Sets，並更新時間戳
                lastLog.sets = (parseInt(lastLog.sets) + parseInt(sets)).toString();
                lastLog.timestamp = new Date().getTime();
            } else {
                logs.push(newEntry);
            }
        } else {
            logs.push(newEntry);
        }
        // -------------------------------------------

        localStorage.setItem('workout_logs', JSON.stringify(logs));

        renderCSV();
        renderHistoryList();
        
        document.getElementById('notes').value = '';

        // 點擊瞬間立刻觸發，不要包在倒數計時裡
        if ("vibrate" in navigator) {
            navigator.vibrate([200, 100, 200]); 
        }
    }

    function renderCSV() {
        let logs = JSON.parse(localStorage.getItem('workout_logs') || "[]");
        
        // 修改 1: 移除 CSV 標題列 (Headerless)
        let csvContent = ""; 
        
        // --- 修改：只顯示未被標記 cleared 的紀錄 ---
        let visibleLogs = logs.filter(log => !log.cleared);
        
        visibleLogs.forEach(log => {
            csvContent += `${log.date},${log.day},${log.muscle},${log.exercise},${log.weight},${log.reps},${log.sets},${log.notes}\n`;
        });

        document.getElementById('log-display').value = csvContent;
    }

    function renderHistoryList() {
        let logs = JSON.parse(localStorage.getItem('workout_logs') || "[]");
        const listContainer = document.getElementById('history-list');
        listContainer.innerHTML = '';
        
        // --- 修改：只抓取未被標記 cleared 的紀錄來顯示 ---
        let visibleLogs = logs.filter(log => !log.cleared);
        const recentLogs = visibleLogs.slice().reverse().slice(0, 5);

        recentLogs.forEach(log => {
            let div = document.createElement('div');
            div.className = 'history-item';
            // --- 修改：加入 +/- 按鈕與垃圾桶圖示，並高亮 Sets 數字 ---
            div.innerHTML = `<div style="display: flex; justify-content: space-between; align-items: center;"><div><div style="font-weight:bold; color:#fff;">${log.exercise}</div><div>${log.weight}kg x ${log.reps} reps x <strong style="color:var(--primary-color); font-size:1.1em;">${log.sets}</strong> sets</div><div class="history-meta">${log.date} (${log.day}) | ${log.notes}</div></div><div style="display: flex; gap: 6px;"><button onclick="updateSets(${log.timestamp}, -1)" style="background-color: #444; color: #fff; border-radius: 4px; width: 28px; height: 28px; padding: 0; display: flex; justify-content: center; align-items: center; font-size: 18px; border: none; cursor: pointer;">-</button><button onclick="updateSets(${log.timestamp}, 1)" style="background-color: #444; color: #fff; border-radius: 4px; width: 28px; height: 28px; padding: 0; display: flex; justify-content: center; align-items: center; font-size: 18px; border: none; cursor: pointer;">+</button><button onclick="deleteLog(${log.timestamp})" style="background-color: #cf6679; color: #000; border-radius: 4px; width: 28px; height: 28px; padding: 0; margin-left: 4px; display: flex; justify-content: center; align-items: center; font-size: 14px; border: none; cursor: pointer;">🗑️</button></div></div>`;
            // --------------------------------
            listContainer.appendChild(div);
        });
    }

    // --- 新增：單筆刪除功能 ---
    function deleteLog(timestamp) {
        if(confirm("確定要刪除這組紀錄嗎？")) {
            let logs = JSON.parse(localStorage.getItem('workout_logs') || "[]");
            // 過濾掉傳入的 timestamp，保留其他的紀錄
            logs = logs.filter(log => log.timestamp !== timestamp);
            localStorage.setItem('workout_logs', JSON.stringify(logs));
            
            // 重新渲染畫面
            renderCSV();
            renderHistoryList();
        }
    }
    // --- 新增：直接增減特定紀錄的組數 ---
    function updateSets(timestamp, delta) {
        let logs = JSON.parse(localStorage.getItem('workout_logs') || "[]");
        let logIndex = logs.findIndex(log => log.timestamp === timestamp);
        
        if (logIndex !== -1) {
            let newSets = parseInt(logs[logIndex].sets) + delta;
            
            if (newSets > 0) {
                // 更新數量並存檔
                logs[logIndex].sets = newSets.toString();
                localStorage.setItem('workout_logs', JSON.stringify(logs));
                
                // 重新渲染畫面與 CSV
                renderCSV();
                renderHistoryList();
            } else {
                // 如果一路扣到 0，直接呼叫刪除功能
                deleteLog(timestamp);
            }
        }
    }
    // 修改 2: 強健的複製功能 (Robust Copy)
    function robustCopyToClipboard() {
        const textArea = document.getElementById("log-display");
        
        // 1. 手機端必須先選取文字
        textArea.select();
        textArea.setSelectionRange(0, 99999); // 針對 iOS/Android 的選取修正

        // 2. 嘗試使用現代 API (需要 HTTPS 或 localhost)
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(textArea.value).then(() => {
                alert("CSV 已複製！(API)");
            }).catch(err => {
                // 如果失敗，退回舊方法
                fallbackCopyText(textArea);
            });
        } else {
            // 3. 如果是 file:// 協定 (本地開啟)，直接用舊方法
            fallbackCopyText(textArea);
        }
    }

    function fallbackCopyText(textArea) {
        try {
            // 這是舊版但相容性最高的方法，特別是在 Android Chrome 開本地檔案時
            document.execCommand('copy');
            alert("CSV 已複製！(Legacy Mode)");
        } catch (err) {
            alert("複製失敗，請手動全選複製。");
        }
    }

    function clearData() {
        if(confirm("確定要清空畫面上的紀錄嗎？\n(歷史紀錄仍會保存在背景，供下次自動帶入重量)")) {
            let logs = JSON.parse(localStorage.getItem('workout_logs') || "[]");
            
            // 1. 把所有目前的紀錄打上「已清除」標記
            logs.forEach(log => log.cleared = true);

            // --- 新增：垃圾回收機制 (保留最近 90 天的紀錄就好) ---
            const ninetyDaysAgo = new Date().getTime() - (90 * 24 * 60 * 60 * 1000);
            logs = logs.filter(log => {
                // 保留畫面上的(以防萬一)，以及 90 天內的隱藏歷史紀錄
                return !log.cleared || log.timestamp > ninetyDaysAgo;
            });
            // ------------------------------------------------

            localStorage.setItem('workout_logs', JSON.stringify(logs));
            
            renderCSV();
            renderHistoryList();
        }
    }

</script>

</body>
</html>
